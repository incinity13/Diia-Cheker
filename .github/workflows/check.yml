name: Check Diia Version
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FRIEND_CHAT_ID: ${{ secrets.FRIEND_CHAT_ID }}
        run: |
          pip install requests
          python Check.py
      - name: Save Version
        run: |
          git config --global user.name 'Bot'
          git config --global user.email 'bot@github.com'
          git add version.txt
          git commit -m "Update version" || exit 0
          git push
